# A legally distinct Iosevka custom build tuned for a genuinely narrow,
# high-density coding texture without copying any commercial outlines.

[buildPlans.BerkaMonoCloserNarrow]
family = "Berka Mono Closer Narrow"
spacing = "normal"
serifs = "sans"
noCvSs = false
noLigation = false
exportGlyphNames = true

[buildPlans.BerkaMonoCloserNarrow.variants]
inherits = "ss09"

[buildPlans.BerkaMonoCloserNarrow.variants.design]
capital-a = "straight-serifless"
capital-b = "standard-serifless"
capital-d = "more-rounded-serifless"
capital-g = "toothless-corner-serifless-hooked"
capital-i = "serifed"
capital-j = "serifed"
capital-k = "straight-serifless"
capital-m = "flat-bottom-serifless"
capital-q = "crossing"
capital-r = "straight-serifless"
capital-w = "straight-flat-top-serifless"
capital-y = "straight-serifless"

a = "double-storey-serifless"
b = "toothless-corner-serifless"
d = "toothed-serifless"
f = "flat-hook-serifless-crossbar-at-x-height"
g = "double-storey"
i = "serifed"
j = "serifed"
k = "straight-serifless"
l = "serifed"
m = "serifless"
n = "straight-serifless"
p = "earless-corner-serifless"
q = "earless-corner-straight-serifless"
r = "serifless"
t = "flat-hook"
u = "toothed-serifless"
w = "straight-serifless"
y = "straight-serifless"

one = "base"
two = "straight-neck-serifless"
three = "flat-top-serifless"
four = "closed-serifless"
five = "upright-flat-serifless"
six = "straight-bar"
seven = "straight-serifless"
eight = "two-circles"
nine = "straight-bar"
zero = "slashed"

asterisk = "penta-low"
brace = "straight"
caret = "medium"
dollar = "through"
ampersand = "upper-open"
at = "fourfold"
percent = "rings-continuous-slash"
number-sign = "upright"
pilcrow = "low"
lig-ltgteq = "slanted"
lig-neq = "slightly-slanted"

[buildPlans.BerkaMonoCloserNarrow.variants.italic]
a = "double-storey-serifless"
f = "flat-hook-tailed"
g = "double-storey"
i = "serifed"
j = "serifed"
k = "straight-serifless"
l = "serifed"
t = "flat-hook"
y = "straight-serifless"

[buildPlans.BerkaMonoCloserNarrow.ligations]
inherits = "default-calt"
disables = [
  "arrow-wave",
  "counter-arrow-wave",
  "html-comment",
  "trig",
]

[buildPlans.BerkaMonoCloserNarrow.weights]
Regular = { shape = 400, menu = 400, css = 400 }
Medium = { shape = 500, menu = 500, css = 500 }
SemiBold = { shape = 600, menu = 600, css = 600 }
Bold = { shape = 700, menu = 700, css = 700 }

[buildPlans.BerkaMonoCloserNarrow.widths]
Normal = { shape = 520, menu = 5, css = "normal" }

[buildPlans.BerkaMonoCloserNarrow.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.BerkaMonoCloserNarrow.slopes.Italic]
angle = 6
shape = "italic"
menu = "italic"
css = "italic"

[buildPlans.BerkaMonoCloserNarrow.metricOverride]
leading = 1180
winMetricAscenderPad = 0
winMetricDescenderPad = 0
powerlineScaleY = 1.08
powerlineScaleX = 1.0
