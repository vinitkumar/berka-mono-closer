# Ghostty example for Berka Mono Closer
font-family = "Berka Mono Closer"
font-family-bold = "Berka Mono Closer"
font-family-italic = "Berka Mono Closer"
font-family-bold-italic = "Berka Mono Closer"
font-size = 15

# Programming ligatures
font-feature = liga
font-feature = calt
font-feature = clig

# Optional: adds a little weight on high-DPI displays
font-thicken = true

